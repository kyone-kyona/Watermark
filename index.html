<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Watermark">
<meta name="theme-color" content="#0f0f0f">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<title>Watermark Stamp</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f7f6f3;
  --surface: #ffffff;
  --surface2: #f0efe9;
  --surface3: #e8e7e0;
  --border: rgba(0,0,0,0.08);
  --border2: rgba(0,0,0,0.15);
  --text: #0f0f0f;
  --text2: #6b6a66;
  --text3: #b0afa9;
  --accent: #0f0f0f;
  --accent-fg: #ffffff;
  --green: #22c55e;
  --warn-bg: #fef3c7; --warn-fg: #92400e;
  --ok-bg: #dcfce7; --ok-fg: #166534;
  --r: 16px; --rs: 10px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #242424;
    --surface3: #2e2e2e;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.15);
    --text: #f5f5f5;
    --text2: #9e9d99;
    --text3: #555;
    --accent: #f5f5f5;
    --accent-fg: #0f0f0f;
    --warn-bg: #3d2200; --warn-fg: #fbbf24;
    --ok-bg: #052e16; --ok-fg: #86efac;
  }
}

body {
  font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh;
  padding: 0 0 80px;
}

/* ── Header ── */
.header {
  padding: 20px 20px 16px;
  border-bottom: 0.5px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 10;
  background: var(--bg);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}
.header-left h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
.header-left p  { font-size: 12px; color: var(--text2); margin-top: 1px; }
#reset-btn {
  display: none;
  padding: 7px 14px; font-size: 13px; font-weight: 500;
  border: 0.5px solid var(--border2); border-radius: 20px;
  background: var(--surface2); color: var(--text2);
  cursor: pointer; -webkit-tap-highlight-color: transparent;
}
#reset-btn:active { background: var(--surface3); }

.content { padding: 16px 16px 0; }

/* ── Upload zone ── */
.pick-wrap { margin-bottom: 16px; }
.pick-btn {
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px;
  width: 100%; padding: 40px 20px;
  background: var(--surface);
  border: 1.5px dashed var(--border2);
  border-radius: var(--r);
  cursor: pointer; text-align: center;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.15s;
}
.pick-btn:active { background: var(--surface2); }
.pick-icon { font-size: 36px; line-height: 1; filter: grayscale(0.2); }
.pick-ttl  { font-size: 15px; font-weight: 600; color: var(--text); }
.pick-sub  { font-size: 12px; color: var(--text2); }
#file-input { opacity:0; pointer-events:none; position:absolute; width:0; height:0; }

/* ── Canvas / preview image ── */
#canvas-wrap { margin-bottom: 16px; }
canvas {
  width: 100%; border-radius: var(--r);
  border: 0.5px solid var(--border);
  display: none; background: var(--surface3);
}

/* ── Status bar ── */
#status-bar { display:none; font-size:13px; padding:8px 12px; border-radius:var(--rs); margin-bottom:12px; }
#status-bar.loading { background:var(--warn-bg); color:var(--warn-fg); }
#status-bar.error   { background:#fce8e8; color:#991b1b; }

/* ── Cards ── */
.card {
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: var(--r);
  padding: 16px; margin-bottom: 12px;
  overflow: hidden;
}
.stitle {
  font-size: 10px; font-weight: 700; color: var(--text3);
  text-transform: uppercase; letter-spacing: .1em; margin-bottom: 14px;
}

/* ── Form elements ── */
.fl { font-size: 13px; color: var(--text2); display: block; margin-bottom: 5px; }
input[type=text] {
  width:100%; padding:10px 12px; font-size:15px;
  border:0.5px solid var(--border2); border-radius:var(--rs);
  background:var(--surface2); color:var(--text);
  margin-bottom:12px; outline:none; -webkit-appearance:none;
}
input[type=text]:focus { border-color: var(--accent); }
input[type=range] { width:100%; margin-bottom:12px; accent-color:var(--accent); }
select {
  width:100%; padding:10px 12px; font-size:14px;
  border:0.5px solid var(--border2); border-radius:var(--rs);
  background:var(--surface2); color:var(--text);
  margin-bottom:12px; outline:none; -webkit-appearance:none;
}
input[type=color] {
  width:40px; height:32px; border:0.5px solid var(--border2);
  border-radius:var(--rs); padding:2px; background:var(--surface2); cursor:pointer;
}

.grid2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.row { display:flex; gap:12px; align-items:flex-end; }
.row > * { flex:1; }
.lrow { display:flex; justify-content:space-between; align-items:center; margin-bottom:5px; }
.vbadge { font-size:12px; color:var(--text3); font-variant-numeric: tabular-nums; }

/* ── Toggle rows ── */
.trow {
  display:flex; align-items:center; justify-content:space-between;
  padding:12px 0; border-bottom:0.5px solid var(--border);
}
.trow:last-child { border-bottom:none; padding-bottom:0; }
.trow:first-child { padding-top:0; }
.tl { font-size:15px; font-weight:500; }
.ts { font-size:12px; color:var(--text2); margin-top:2px; }

.sw { position:relative; width:48px; height:28px; flex-shrink:0; }
.sw input { opacity:0; width:0; height:0; }
.sl {
  position:absolute; inset:0; background:var(--border2);
  border-radius:28px; cursor:pointer; transition:background .2s;
}
.sl::before {
  content:''; position:absolute; width:22px; height:22px;
  left:3px; top:3px; background:#fff; border-radius:50%;
  transition:transform .2s; box-shadow:0 1px 4px rgba(0,0,0,.25);
}
input:checked + .sl { background:var(--green); }
input:checked + .sl::before { transform:translateX(20px); }

/* ── Position grid ── */
.pgrid { display:grid; grid-template-columns:repeat(3,1fr); gap:6px; margin-bottom:12px; }
.pb {
  padding:10px 4px; font-size:12px;
  border:0.5px solid var(--border); border-radius:var(--rs);
  background:var(--surface2); cursor:pointer; text-align:center;
  color:var(--text2); -webkit-tap-highlight-color:transparent;
  transition: all 0.1s;
}
.pb.active { background:var(--accent); color:var(--accent-fg); border-color:var(--accent); }

/* ── Status boxes ── */
.sbox { font-size:13px; padding:8px 12px; border-radius:var(--rs); margin-top:10px; line-height:1.5; }
.sbox.warn { background:var(--warn-bg); color:var(--warn-fg); }
.sbox.ok   { background:var(--ok-bg);   color:var(--ok-fg); }

/* ── Preview box ── */
.prev-box {
  background:var(--surface2); border-radius:var(--rs);
  padding:10px 12px; font-size:12px; color:var(--text2);
  font-family:monospace; line-height:1.8; margin-top:4px; word-break:break-all;
  border-left: 2px solid var(--border2);
}

/* ── Bottom action bar ── */
#action-bar {
  display: none;
  position: fixed; bottom: 0; left: 0; right: 0;
  padding: 12px 16px;
  padding-bottom: max(12px, env(safe-area-inset-bottom));
  background: var(--bg);
  border-top: 0.5px solid var(--border);
  display: none;
  gap: 10px;
}
#save-btn {
  flex: 1; padding: 14px; font-size: 16px; font-weight: 700;
  cursor: pointer; border-radius: var(--r); border: none;
  background: var(--accent); color: var(--accent-fg);
  -webkit-tap-highlight-color: transparent;
}
#save-btn:active { opacity: 0.8; }

/* ── Saved image output ── */
#img-out-wrap {
  display:none; margin-top:0; margin-bottom:12px;
  background:var(--surface); border-radius:var(--r);
  padding:16px; border:0.5px solid var(--border); text-align:center;
}
.save-instructions {
  font-size:13px; color:var(--text2); margin-bottom:12px;
  line-height:1.6; background:var(--ok-bg); color:var(--ok-fg);
  padding:10px 12px; border-radius:var(--rs);
}
#img-out { max-width:100%; border-radius:var(--rs); display:block; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>📷 Watermark Stamp</h1>
    <p>Stamp date, time & location</p>
  </div>
  <button id="reset-btn" onclick="resetApp()">↺ New photo</button>
</div>

<div class="content">

<div class="pick-wrap">
  <label class="pick-btn" for="file-input">
    <span class="pick-icon">🖼️</span>
    <span class="pick-ttl" id="pick-ttl">Tap to choose a photo</span>
    <span class="pick-sub">Camera Roll · Files · Camera</span>
  </label>
  <input type="file" id="file-input" accept="image/*">
</div>

<div id="status-bar"></div>
<div id="canvas-wrap"><canvas id="canvas"></canvas></div>

<!-- Saved image shown here for long-press save -->
<div id="img-out-wrap">
  <div class="save-instructions">⬇️ Hold the image below → tap <strong>Save to Photos</strong></div>
  <img id="img-out" alt="Watermarked photo">
</div>

<div class="card" id="content-card" style="display:none">
  <div class="stitle">Watermark content</div>
  <div class="trow">
    <div><div class="tl">📅 Date</div><div class="ts" id="date-prev">—</div></div>
    <label class="sw"><input type="checkbox" id="show-date" checked onchange="render()"><span class="sl"></span></label>
  </div>
  <div class="trow">
    <div><div class="tl">🕐 Time</div><div class="ts" id="time-prev">—</div></div>
    <label class="sw"><input type="checkbox" id="show-time" checked onchange="render()"><span class="sl"></span></label>
  </div>
  <div class="trow">
    <div><div class="tl">📍 Location</div><div class="ts" id="loc-sub">Toggle to add</div></div>
    <label class="sw"><input type="checkbox" id="show-loc" onchange="toggleLoc()"><span class="sl"></span></label>
  </div>
  <div id="loc-area" style="display:none; margin-top:12px">
    <div class="sbox warn" id="loc-status">Type your location, or GPS will try automatically.</div>
    <div style="margin-top:8px">
      <label class="fl">Location text</label>
      <input type="text" id="loc-manual" placeholder="e.g. Tokyo, Japan" oninput="onManualLoc()">
    </div>
  </div>
  <div style="margin-top:8px">
    <label class="fl">Custom text (optional)</label>
    <input type="text" id="custom-prefix" placeholder="e.g. © Your Name">
  </div>
  <div id="prev-wrap" style="display:none">
    <label class="fl" style="margin-top:4px">Preview</label>
    <div class="prev-box" id="wm-prev"></div>
  </div>
</div>

<div class="card" id="style-card" style="display:none">
  <div class="stitle">Style</div>
  <div class="grid2">
    <div>
      <div class="lrow"><span class="fl" style="margin:0">Font size</span><span class="vbadge" id="sz-v">80px</span></div>
      <input type="range" id="font-size" min="8" max="200" value="80" oninput="document.getElementById('sz-v').textContent=this.value+'px';render()">
    </div>
    <div>
      <div class="lrow"><span class="fl" style="margin:0">Opacity</span><span class="vbadge" id="op-v">70%</span></div>
      <input type="range" id="opacity" min="5" max="100" value="70" oninput="document.getElementById('op-v').textContent=this.value+'%';render()">
    </div>
  </div>
  <div class="row" style="margin-bottom:12px">
    <div><label class="fl">Color</label><input type="color" id="wm-color" value="#ffffff" onchange="render()"></div>
    <div><label class="fl">Font</label>
      <select id="font-fam" onchange="render()">
        <option value="monospace" selected>Monospace</option>
        <option value="sans-serif">Sans-serif</option>
        <option value="serif">Serif</option>
        <option value="cursive">Cursive</option>
      </select>
    </div>
  </div>
  <div class="grid2">
    <div><label class="fl">Background</label>
      <select id="bg-style" onchange="render()">
        <option value="dark" selected>Dark pill</option>
        <option value="light">Light pill</option>
        <option value="semi">Semi-transparent</option>
        <option value="none">None</option>
      </select>
    </div>
    <div><label class="fl">Layout</label>
      <select id="layout" onchange="render()">
        <option value="stacked">Stacked</option>
        <option value="inline">Single line</option>
      </select>
    </div>
  </div>
  <label class="fl">Blend mode</label>
  <select id="blend" onchange="render()">
    <option value="normal">Normal</option>
    <option value="multiply">Multiply</option>
    <option value="screen">Screen</option>
    <option value="overlay">Overlay</option>
  </select>
  <label class="fl">Position</label>
  <div class="pgrid">
    <button class="pb" data-pos="top-left">↖ Top L</button>
    <button class="pb" data-pos="top-center">↑ Top C</button>
    <button class="pb" data-pos="top-right">↗ Top R</button>
    <button class="pb" data-pos="middle-left">← Mid L</button>
    <button class="pb" data-pos="center">⊙ Center</button>
    <button class="pb" data-pos="middle-right">→ Mid R</button>
    <button class="pb" data-pos="bottom-left">↙ Bot L</button>
    <button class="pb" data-pos="bottom-center">↓ Bot C</button>
    <button class="pb active" data-pos="bottom-right">↘ Bot R</button>
  </div>
  <div class="lrow"><span class="fl" style="margin:0">Margin</span><span class="vbadge" id="mg-v">20px</span></div>
  <input type="range" id="margin" min="0" max="120" value="20" oninput="document.getElementById('mg-v').textContent=this.value+'px';render()">
</div>

</div><!-- /content -->

<!-- Fixed bottom bar -->
<div id="action-bar" style="display:none; position:fixed; bottom:0; left:0; right:0; padding:12px 16px; background:var(--bg); border-top:0.5px solid var(--border);">
  <button id="save-btn" onclick="showSaved()" style="width:100%; padding:14px; font-size:16px; font-weight:700; cursor:pointer; border-radius:var(--r); border:none; background:var(--accent); color:var(--accent-fg); -webkit-tap-highlight-color:transparent;">
    📥 Save photo
  </button>
</div>

<script>
var img = null, pos = 'bottom-right', locAddr = null, locCoords = null, objUrl = null;
var canvas = document.getElementById('canvas');
var ctx = canvas.getContext('2d');

/* ── clock ── */
function getDateTime() {
  var n = new Date();
  var date = n.toLocaleDateString(undefined,{weekday:'short',day:'numeric',month:'short',year:'numeric'});
  var time = n.toLocaleTimeString(undefined,{hour:'2-digit',minute:'2-digit',hour12:false});
  return { combined:'📅 '+date+' | 🕐 '+time, date:'📅 '+date, time:'🕐 '+time };
}
function tick() {
  var t=getDateTime();
  document.getElementById('date-prev').textContent=t.date;
  document.getElementById('time-prev').textContent=t.time;
}
tick(); setInterval(function(){ tick(); if(img) render(); }, 1000);

document.getElementById('custom-prefix').addEventListener('input', render);

/* ── file input ── */
document.getElementById('file-input').addEventListener('change', function(e) {
  var file = e.target.files && e.target.files[0];
  if (!file) return;
  showStatus('loading','⏳ Loading image…');
  if (objUrl) { URL.revokeObjectURL(objUrl); objUrl = null; }
  var newImg = new Image();
  newImg.onload = function() {
    img = newImg;
    canvas.style.display = 'block';
    document.getElementById('content-card').style.display = 'block';
    document.getElementById('style-card').style.display = 'block';
    document.getElementById('action-bar').style.display = 'block';
    document.getElementById('img-out-wrap').style.display = 'none';
    document.getElementById('pick-ttl').textContent = '✅ ' + file.name;
    document.getElementById('reset-btn').style.display = 'block';
    hideStatus();
    render();
    // scroll to top to show photo
    window.scrollTo({top:0, behavior:'smooth'});
  };
  newImg.onerror = function() { showStatus('error','❌ Could not load image. Try another file.'); };
  objUrl = URL.createObjectURL(file);
  newImg.src = objUrl;
});

function showStatus(t,m){ var e=document.getElementById('status-bar'); e.className=t; e.textContent=m; e.style.display='block'; }
function hideStatus(){ document.getElementById('status-bar').style.display='none'; }

/* ── reset ── */
function resetApp() {
  img = null;
  if (objUrl) { URL.revokeObjectURL(objUrl); objUrl = null; }
  canvas.style.display = 'none';
  canvas.width = 1; canvas.height = 1;
  document.getElementById('content-card').style.display = 'none';
  document.getElementById('style-card').style.display = 'none';
  document.getElementById('action-bar').style.display = 'none';
  document.getElementById('img-out-wrap').style.display = 'none';
  document.getElementById('prev-wrap').style.display = 'none';
  document.getElementById('reset-btn').style.display = 'none';
  document.getElementById('pick-ttl').textContent = 'Tap to choose a photo';
  document.getElementById('file-input').value = '';
  // reset location
  locAddr = null; locCoords = null;
  document.getElementById('show-loc').checked = false;
  document.getElementById('loc-area').style.display = 'none';
  document.getElementById('loc-sub').textContent = 'Toggle to add';
  document.getElementById('loc-manual').value = '';
  document.getElementById('custom-prefix').value = '';
  window.scrollTo({top:0, behavior:'smooth'});
}

/* ── position buttons ── */
document.querySelectorAll('.pb').forEach(function(b) {
  b.addEventListener('click', function() {
    document.querySelectorAll('.pb').forEach(function(x){ x.classList.remove('active'); });
    b.classList.add('active'); pos = b.dataset.pos; render();
  });
});

/* ── location ── */
function toggleLoc() {
  var on = document.getElementById('show-loc').checked;
  document.getElementById('loc-area').style.display = on ? 'block' : 'none';
  if (!on) { locAddr=null; locCoords=null; render(); return; }
  if (navigator.geolocation && window.location.protocol !== 'file:') {
    setLS('warn','⏳ Getting GPS…');
    navigator.geolocation.getCurrentPosition(function(p) {
      var la=p.coords.latitude, lo=p.coords.longitude;
      locCoords=la.toFixed(5)+'°N, '+lo.toFixed(5)+'°E';
      fetch('https://nominatim.openstreetmap.org/reverse?lat='+la+'&lon='+lo+'&format=json')
        .then(function(r){ return r.json(); })
        .then(function(d) {
          var a=d.address;
          var building = a.amenity||a.building||a.shop||a.tourism||a.leisure||a.office||null;
          var road     = a.road||a.pedestrian||a.footway||a.path||null;
          var area     = a.suburb||a.neighbourhood||a.quarter||a.village||a.town||a.city_district||null;
          var pts      = [building, road, area].filter(Boolean);
          locAddr = pts.slice(0,3).join(', ');
          document.getElementById('loc-manual').value=locAddr;
          document.getElementById('loc-sub').textContent=locAddr;
          setLS('ok','✅ '+locAddr); render();
        }).catch(function(){
          locAddr=null;
          document.getElementById('loc-manual').value=locCoords;
          setLS('ok','✅ '+locCoords); render();
        });
    }, function(){ setLS('warn','⚠️ GPS denied — type location below.'); },
    {enableHighAccuracy:true,timeout:10000});
  } else {
    setLS('warn','⚠️ GPS needs HTTPS. Type your location below.');
  }
}
function setLS(t,m){ var e=document.getElementById('loc-status'); e.className='sbox '+t; e.textContent=m; }
function onManualLoc() {
  var v=document.getElementById('loc-manual').value.trim();
  locAddr=v||null; locCoords=null;
  if(v){ document.getElementById('loc-sub').textContent=v; setLS('ok','✅ '+v); }
  render();
}

/* ── build watermark lines ── */
function buildLines() {
  var t=getDateTime(), parts=[];
  var pfx=document.getElementById('custom-prefix').value.trim();
  if(pfx) parts.push(pfx);
  var sd=document.getElementById('show-date').checked;
  var st=document.getElementById('show-time').checked;
  if(sd && st) parts.push(t.combined);
  else if(sd)  parts.push(t.date);
  else if(st)  parts.push(t.time);
  if(document.getElementById('show-loc').checked) {
    if(locAddr)   parts.push('📍 '+locAddr);
    if(locCoords) parts.push('🌐 '+locCoords);
    if(!locAddr && !locCoords) parts.push('📍 —');
  }
  if(!parts.length) parts=['Watermark'];
  var lines=document.getElementById('layout').value==='inline'?[parts.join('  •  ')]:parts;
  document.getElementById('prev-wrap').style.display='block';
  document.getElementById('wm-prev').textContent=lines.join('\n');
  return lines;
}

/* ── render ── */
function render() {
  if(!img) return;
  canvas.width=img.naturalWidth||img.width;
  canvas.height=img.naturalHeight||img.height;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.drawImage(img,0,0);

  var lines=buildLines();
  var fs=parseInt(document.getElementById('font-size').value);
  var alpha=parseInt(document.getElementById('opacity').value)/100;
  var color=document.getElementById('wm-color').value;
  var ff=document.getElementById('font-fam').value;
  var blend=document.getElementById('blend').value;
  var mg=parseInt(document.getElementById('margin').value);
  var bg=document.getElementById('bg-style').value;
  var lh=fs*1.5, th=lines.length*lh;

  ctx.font=fs+'px '+ff;
  var mw=0;
  for(var i=0;i<lines.length;i++){ var w=ctx.measureText(lines[i]).width; if(w>mw) mw=w; }
  var px=fs*.65, py=fs*.45;

  var ax,ay;
  if(pos.indexOf('left')>-1) ax=mg;
  else if(pos.indexOf('right')>-1) ax=canvas.width-mw-mg;
  else ax=(canvas.width-mw)/2;
  if(pos.indexOf('top')>-1) ay=mg;
  else if(pos.indexOf('bottom')>-1) ay=canvas.height-th-mg;
  else ay=(canvas.height-th)/2;

  ctx.globalAlpha=alpha; ctx.globalCompositeOperation=blend;
  if(bg!=='none'){
    ctx.fillStyle=bg==='dark'?'rgba(0,0,0,.65)':bg==='light'?'rgba(255,255,255,.65)':'rgba(0,0,0,.4)';
    var rx=fs*.4, bx=ax-px, by=ay-py, bw=mw+px*2, bh=th+py*2;
    ctx.beginPath();
    ctx.moveTo(bx+rx,by); ctx.lineTo(bx+bw-rx,by); ctx.quadraticCurveTo(bx+bw,by,bx+bw,by+rx);
    ctx.lineTo(bx+bw,by+bh-rx); ctx.quadraticCurveTo(bx+bw,by+bh,bx+bw-rx,by+bh);
    ctx.lineTo(bx+rx,by+bh); ctx.quadraticCurveTo(bx,by+bh,bx,by+bh-rx);
    ctx.lineTo(bx,by+rx); ctx.quadraticCurveTo(bx,by,bx+rx,by);
    ctx.closePath(); ctx.fill();
  }
  ctx.fillStyle=color; ctx.textBaseline='top'; ctx.textAlign='left';
  for(var j=0;j<lines.length;j++) ctx.fillText(lines[j],ax,ay+j*lh);
  ctx.globalAlpha=1; ctx.globalCompositeOperation='source-over';
}

/* ── save: render to <img> for long-press → Save to Photos ── */
function showSaved() {
  if(!img) return;
  render();
  var dataUrl=canvas.toDataURL('image/jpeg',0.95);
  var out=document.getElementById('img-out');
  out.src=dataUrl;
  var wrap=document.getElementById('img-out-wrap');
  wrap.style.display='block';
  setTimeout(function(){ wrap.scrollIntoView({behavior:'smooth',block:'start'}); },100);
}

/* ── service worker ── */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('/watermark-stamp/sw.js')
      .catch(function(e){ console.log('SW error:', e); });
  });
}
</script>
